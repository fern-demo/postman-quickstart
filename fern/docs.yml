# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: plantstore.docs.buildwithfern.com

title: Fern Docs Starter

layout:
  searchbar-placement: header
  page-width: full
  tabs-placement: header

roles:
  - everyone
  - Admin

products:
  - display-name: Fern
    path: ./products/fern.yml
    icon: fa-solid fa-leaf
    slug: fern
    viewers:
      - everyone

  - display-name: Postman
    path: ./products/postman/versions/new/new.yml
    icon: fa-solid fa-rocket
    slug: postman
    viewers:
      - Admin
    versions:
      - display-name: New
        path: ./products/postman/versions/new/new.yml
        slug: new
      - display-name: Old
        path: ./products/postman/versions/old/old.yml
        slug: old

navbar-links:
  - type: minimal
    text: Fork this repo
    url: https://github.com/fern-api/docs-starter
  - type: filled
    text: Dashboard
    url: https://dashboard.buildwithfern.com
  - type: github
    value: https://github.com/fern-api/fern

footer-links:
  x: https://x.com/getpostman
  linkedin: https://www.linkedin.com/company/postman-platform
  github: https://github.com/postmanlabs
  youtube: https://www.youtube.com/postman
  instagram: https://www.instagram.com/getpostman
  discord: https://discord.gg/rKZgwpZqqV

colors:
  accent-primary:
    dark: "#70E155"
    light: "#008700"
  background:
    dark: "#111113"
    light: "#FFFFFF"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: docs/assets/logo-dark.svg
  light: docs/assets/logo.svg
  height: 20
  href: https://buildwithfern.com

favicon: docs/assets/favicon.svg

css: styles.css

footer: ./components/PostmanFooter.tsx

experimental:
  mdx-components:
    - ./components
